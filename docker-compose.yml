services:
  db:
    image: postgres:15
    container_name: linktracker-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-123456}
      POSTGRES_DB: ${DB_NAME:-linktracker}
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-linktracker}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks: [app-net]

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: linktracker-zk
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks: [app-net]

  kafka-1:
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [zookeeper]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports: ["9092:9092"]
    networks: [app-net]

  kafka-2:
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [zookeeper]
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:29093,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports: ["9093:9093"]
    networks: [app-net]

  kafka-3:
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [zookeeper]
    environment:
      KAFKA_BROKER_ID: 3
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-3:29094,PLAINTEXT_HOST://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports: ["9094:9094"]
    networks: [app-net]

  scrapper:
    build: .
    container_name: linktracker-scrapper
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-linktracker}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      ACCESS_TYPE: ${ACCESS_TYPE:-ORM}
      NOTIFICATION_BACKEND: kafka
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:29092,kafka-2:29093,kafka-3:29094
      KAFKA_TOPIC: link.notifications
      BOT_URL: http://bot:8000
      CHECK_INTERVAL_SECONDS: 60
      BATCH_SIZE: 100
      PARALLEL_WORKERS: 4
      HTTP_TIMEOUT: 10.0
      RETRY_MAX_ATTEMPTS: 3
      RETRY_WAIT_MS: 1000
      RETRYABLE_STATUSES: "429,500,502,503,504"
      CB_FAILURE_THRESHOLD: 5
      CB_RECOVERY_TIMEOUT: 30
      RATE_LIMIT_MAX_REQUESTS: 60
      RATE_LIMIT_WINDOW_SECONDS: 60
    ports: ["8080:8080"]
    depends_on:
      db: {condition: service_healthy}
      kafka-1: {condition: service_started}
    networks: [app-net]
    command: >
      sh -c "
        echo '⏳ Waiting for DB & Kafka...' &&
        python -c 'import socket,time;
        while True:
          try: socket.create_connection((\"db\",5432),timeout=1); break
          except OSError: time.sleep(1)
        while True:
          try: socket.create_connection((\"kafka-1\",29092),timeout=1); break
          except OSError: time.sleep(1)
        print(\"✅ Services ready!\")' &&
        poetry run uvicorn src.scrapper_service.main:app --host 0.0.0.0 --port 8080
      "

  bot:
    build: .
    container_name: linktracker-bot
    restart: unless-stopped
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      PROXY: ${PROXY}
      MESSAGE_SOURCE: kafka
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:29092,kafka-2:29093,kafka-3:29094
      KAFKA_TOPIC: link.processed-updates
      KAFKA_CONSUMER_GROUP: bot-service-consumers
      KAFKA_AUTO_OFFSET_RESET: earliest
      SCRAPPER_URL: http://scrapper:8080
      API_HOST: 0.0.0.0
      API_PORT: 8000
      RATE_LIMIT_MAX_REQUESTS: 100
      RATE_LIMIT_WINDOW_SECONDS: 60
    ports: ["8000:8000"]
    depends_on: [kafka-1]
    networks: [app-net]
    command: >
      sh -c "
        echo '⏳ Waiting for Kafka...' &&
        python -c 'import socket,time;
        while True:
          try: socket.create_connection((\"kafka-1\",29092),timeout=1); break
          except OSError: time.sleep(1)
        print(\"✅ Kafka ready!\")' &&
        poetry run uvicorn src.bot_service.main:fastapi_app --host 0.0.0.0 --port 8000
      "

networks:
  app-net:
    driver: bridge

volumes:
  pgdata:
    driver: local